spring:
  application:
    name: portal
  datasource:
    url: jdbc:postgresql://localhost:5432/portal
    username: portal
    password: portal
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yml
  mail:
    host: localhost
    port: 1025
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: portal-applications
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ru.akozadaev.portal.application.kafka
        spring.json.value.default.type: ru.akozadaev.portal.application.kafka.ApplicationProcessingEvent

portal:
  kafka:
    consumer:
      enabled: true
    topics:
      application-processing: portal.application.processing
  application-processing:
    enabled: true
    fixed-delay-ms: 10000
    batch-size: 50

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/portal
    username: portal
    password: portal
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  mail:
    host: localhost
    port: 1025

portal:
  kafka:
    topics:
      application-processing: portal.application.processing
  application-processing:
    enabled: true
    fixed-delay-ms: 10000
    batch-size: 50

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yml
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: portal-applications-test
  mail:
    host: localhost
    port: 1025

portal:
  kafka:
    consumer:
      enabled: false
    topics:
      application-processing: portal.application.processing.test
  application-processing:
    enabled: false
