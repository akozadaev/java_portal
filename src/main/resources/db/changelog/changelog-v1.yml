databaseChangeLog:
  - changeSet:
      id: 001-create-applications-table
      author: akozadaev
      changes:
        - createTable:
            tableName: applications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: applications

  - changeSet:
      id: 002-create-applications-status-created-at-index
      author: akozadaev
      changes:
        - createIndex:
            tableName: applications
            indexName: idx_applications_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
      rollback:
        - dropIndex:
            tableName: applications
            indexName: idx_applications_status_created_at
