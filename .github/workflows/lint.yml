name: Java Linter CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Запускаем checkstyle и spotbugs, но позволяем продолжить для отчета
      - name: Run Checkstyle and SpotBugs
        run: mvn -B checkstyle:check spotbugs:check || true

  reviewdog-checkstyle:
    name: Checkstyle Reviewdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Генерируем XML отчет
      - name: Generate Checkstyle Report
        run: mvn checkstyle:checkstyle -Dcheckstyle.failsOnError=false

      # Устанавливаем reviewdog
      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      # Отправляем отчет в PR
      - name: Run reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog -reporter=github-pr-review -f=checkstyle -f.checkstyle.path=target/checkstyle-result.xml